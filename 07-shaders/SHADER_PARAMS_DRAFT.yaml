notes:
- "LSD logic emphasis does not mean generic trippy color increase."
- "It means stronger symbolic reassignment, figure-pattern instability, and metamorphic
continuity."
- "Cheapness controls should remain active enough to prevent over-polished outputs."
- "Abstract fields should preserve body-haunted emergence pressure."
